; Supervisord configuration for coding-services container
; Manages all MCP servers and web services

[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor
loglevel=info

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

; ===========================================
; MCP Servers (HTTP/SSE)
; ===========================================

[program:semantic-analysis]
command=node /coding/integrations/mcp-server-semantic-analysis/dist/sse-server.js
directory=/coding/integrations/mcp-server-semantic-analysis
environment=
    CODING_ROOT="/coding",
    SEMANTIC_ANALYSIS_PORT="%(ENV_SEMANTIC_ANALYSIS_PORT)s",
    QDRANT_URL="%(ENV_QDRANT_URL)s",
    ANTHROPIC_API_KEY="%(ENV_ANTHROPIC_API_KEY)s",
    OPENAI_API_KEY="%(ENV_OPENAI_API_KEY)s",
    GOOGLE_AI_API_KEY="%(ENV_GOOGLE_AI_API_KEY)s"
autostart=true
autorestart=true
startsecs=5
startretries=3
stopwaitsecs=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=100

; browser-access program block removed — browserbase/stagehand MCP servers
; were retired in favor of the /gsd-browser skill (Playwright via CLI).
; The integrations/browser-access directory no longer exists in the image,
; so supervisord was hitting "Exited too quickly (process log may have details)"
; every restart and surfacing FATAL on the dashboard.

[program:constraint-monitor]
command=node /coding/integrations/mcp-constraint-monitor/src/sse-server.js
directory=/coding/integrations/mcp-constraint-monitor
environment=
    CONSTRAINT_MONITOR_PORT="%(ENV_CONSTRAINT_MONITOR_PORT)s",
    QDRANT_URL="%(ENV_QDRANT_URL)s",
    REDIS_URL="%(ENV_REDIS_URL)s",
    HTTP_PROXY="",
    HTTPS_PROXY="",
    http_proxy="",
    https_proxy=""
autostart=true
autorestart=true
startsecs=5
startretries=3
stopwaitsecs=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:constraint-dashboard]
command=/coding/integrations/mcp-constraint-monitor/dashboard/node_modules/.bin/next start -p 3030
directory=/coding/integrations/mcp-constraint-monitor/dashboard
environment=
    CONSTRAINT_DASHBOARD_PORT="3030",
    CONSTRAINT_API_PORT="3031",
    NODE_ENV="production",
    HTTP_PROXY="",
    HTTPS_PROXY="",
    http_proxy="",
    https_proxy=""
autostart=true
autorestart=true
startsecs=5
startretries=3
stopwaitsecs=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=100

[program:constraint-dashboard-api]
command=node /coding/integrations/mcp-constraint-monitor/src/dashboard-server.js
directory=/coding/integrations/mcp-constraint-monitor
environment=
    CONSTRAINT_DASHBOARD_PORT="3030",
    CONSTRAINT_API_PORT="3031",
    HTTP_PROXY="",
    HTTPS_PROXY="",
    http_proxy="",
    https_proxy=""
autostart=true
autorestart=true
startsecs=5
startretries=3
stopwaitsecs=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=100

[program:code-graph-rag]
command=/coding/integrations/code-graph-rag/.venv/bin/python -m codebase_rag.mcp.sse_server
directory=/coding/integrations/code-graph-rag
environment=
    CODE_GRAPH_RAG_PORT="%(ENV_CODE_GRAPH_RAG_PORT)s",
    MEMGRAPH_HOST="%(ENV_MEMGRAPH_HOST)s",
    MEMGRAPH_PORT="%(ENV_MEMGRAPH_PORT)s",
    TARGET_REPO_PATH="/workspace",
    HTTP_PROXY="",
    HTTPS_PROXY="",
    http_proxy="",
    https_proxy=""
autostart=true
autorestart=true
startsecs=10
startretries=3
stopwaitsecs=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=100

[program:embedding-listener]
command=node /coding/dist/embedding/listener.js
directory=/coding
; NOTE: proxy is intentionally inherited (not cleared) — fastembed always
; pings storage.googleapis.com on init, even with model cached locally.
; NO_PROXY already excludes qdrant/redis/memgraph/localhost so loopback
; traffic still bypasses the proxy.
environment=
    QDRANT_URL="%(ENV_QDRANT_URL)s",
    REDIS_URL="%(ENV_REDIS_URL)s"
autostart=true
autorestart=true
startsecs=10
startretries=5
stopwaitsecs=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=150

; ===========================================
; Web Services
; ===========================================

[program:vkb-server]
command=node /coding/lib/vkb-server/express-server.js
directory=/coding/lib/vkb-server
environment=
    VKB_PORT="%(ENV_VKB_PORT)s",
    QDRANT_URL="%(ENV_QDRANT_URL)s",
    HTTP_PROXY="",
    HTTPS_PROXY="",
    http_proxy="",
    https_proxy=""
autostart=true
autorestart=true
startsecs=5
startretries=3
stopwaitsecs=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=50

[program:health-dashboard]
command=node /coding/integrations/system-health-dashboard/server.js
directory=/coding/integrations/system-health-dashboard
environment=
    PORT="%(ENV_HEALTH_DASHBOARD_PORT)s",
    WS_PORT="%(ENV_HEALTH_DASHBOARD_WS_PORT)s"
autostart=true
autorestart=true
startsecs=5
startretries=3
stopwaitsecs=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=50

[program:health-dashboard-frontend]
command=node /coding/integrations/system-health-dashboard/static-server.js
directory=/coding/integrations/system-health-dashboard
environment=HEALTH_DASHBOARD_PORT="%(ENV_HEALTH_DASHBOARD_PORT)s"
autostart=true
autorestart=true
startsecs=3
startretries=3
stopwaitsecs=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=50

; ===========================================
; Health Monitoring
; ===========================================

; health-verifier program block removed: the `start` (daemon) subcommand
; was deleted in plan 33-04 when the coordinator at :3034 took ownership
; of lifecycle. health-verifier.js now only supports verify/status/report
; one-shot CLIs invoked from the host. The supervisord block was kept with
; autostart=false as a transitional shim; it surfaces a permanent STOPPED ✗
; on the dashboard for no operational reason. Drop it entirely.

; ===========================================
; Process Groups
; ===========================================

[group:mcp-servers]
programs=semantic-analysis,constraint-monitor,code-graph-rag,embedding-listener
priority=100

[group:web-services]
programs=vkb-server,health-dashboard,health-dashboard-frontend,constraint-dashboard,constraint-dashboard-api
priority=50
