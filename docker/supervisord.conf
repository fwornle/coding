; ===========================================
; Health Monitoring
; ===========================================

[program:health-verifier]
command=node /coding/scripts/health-verifier.js start
directory=/coding
environment=CODING_REPO="/coding"
autostart=true
autorestart=true
startsecs=10
startretries=3
stopwaitsecs=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=200

; ===========================================
; Process Groups
; ===========================================

[group:mcp-servers]
programs=semantic-analysis,browser-access,constraint-monitor,code-graph-rag,embedding-listener
priority=100

[group:web-services]
programs=vkb-server,health-dashboard,health-dashboard-frontend,constraint-dashboard,constraint-dashboard-api
