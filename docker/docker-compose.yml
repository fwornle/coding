# Docker Compose for Coding Infrastructure
# Provides containerized MCP servers, web services, and databases

services:
  # ===========================================
  # Main Application Container
  # ===========================================
  coding-services:
    build:
      context: ..
      dockerfile: docker/Dockerfile.coding-services
    container_name: coding-services
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      memgraph:
        condition: service_healthy
    environment:
      # Service ports
      - SEMANTIC_ANALYSIS_PORT=3848
      - BROWSER_ACCESS_PORT=3847
      - CONSTRAINT_MONITOR_PORT=3849
      - CODE_GRAPH_RAG_PORT=3850
      - VKB_PORT=8080
      - HEALTH_DASHBOARD_PORT=3032
      - HEALTH_DASHBOARD_WS_PORT=3033
      # Database connections (container networking)
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379
      - MEMGRAPH_HOST=memgraph
      - MEMGRAPH_PORT=7687
      # Bypass corporate proxy for internal Docker networking
      - no_proxy=qdrant,redis,memgraph,localhost,127.0.0.1,coding-qdrant,coding-redis,coding-memgraph,host.docker.internal
      - NO_PROXY=qdrant,redis,memgraph,localhost,127.0.0.1,coding-qdrant,coding-redis,coding-memgraph,host.docker.internal
      # PlantUML include path (resolves !include _standard-style.puml in diagrams)
      - JAVA_TOOL_OPTIONS=-Dplantuml.include.path=/coding/docs/puml
      # Project paths (mapped via volumes)
      - TARGET_REPO_PATH=/workspace
      - CODING_ROOT=/coding
      # CODING_REPO is what config-manager.js uses to find .constraint-monitor.yaml.
      # Inside the container this is /coding (bind-mounted from the host repo).
      - CODING_REPO=/coding
      # API keys (passed through from host)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      # Local LLM - Docker Model Runner (DMR) on host
      # DMR uses llama.cpp under the hood for local inference
      - DMR_HOST=host.docker.internal
      - DMR_PORT=12434
      # Ollama fallback (if DMR unavailable) - also on host
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      # LLM CLI Proxy - HTTP bridge to host's claude/copilot-cli commands
      - LLM_CLI_PROXY_URL=http://host.docker.internal:12435
    ports:
      - "8080:8080"     # VKB Server
      - "3847:3847"     # Browser Access SSE
      - "3848:3848"     # Semantic Analysis SSE
      - "3849:3849"     # Constraint Monitor SSE
      - "3850:3850"     # Code-Graph-RAG SSE
      - "3030:3030"     # Constraint Dashboard (Next.js)
      - "3031:3031"     # Constraint Dashboard API
      - "3032:3032"     # Health Dashboard HTTP
      - "3033:3033"     # Health Dashboard WebSocket
    volumes:
      # Persistent data
      - ${CODING_REPO:-.}/.data:/coding/.data
      - ${CODING_REPO:-.}/.observations:/coding/.observations
      - ${CODING_REPO:-.}/.specstory:/coding/.specstory
      - ${CODING_REPO:-.}/knowledge-management:/coding/knowledge-management
      - ${CODING_REPO:-.}/.git:/coding/.git:ro
      # Workspace access (host repos)
      - ${HOME}/Agentic:/workspace:ro
      # Config files (live-mounted to avoid staleness)
      - ${CODING_REPO:-.}/.env:/coding/.env:ro
      - ${CODING_REPO:-.}/integrations/mcp-server-semantic-analysis/config:/coding/integrations/mcp-server-semantic-analysis/config:rw
      # Semantic analysis dist (live-mounted to avoid Docker rebuild for TS changes)
      - ${CODING_REPO:-.}/integrations/mcp-server-semantic-analysis/dist:/coding/integrations/mcp-server-semantic-analysis/dist:ro
      # PlantUML standard styles (needed for diagram generation)
      - ${CODING_REPO:-.}/docs/puml:/coding/docs/puml:ro
      # Dashboard build (live-mounted for development)
      - ${CODING_REPO:-.}/integrations/system-health-dashboard/dist:/coding/integrations/system-health-dashboard/dist:ro
      # Dashboard server (live-mounted to avoid Docker rebuild for API changes)
      - ${CODING_REPO:-.}/integrations/system-health-dashboard/server.js:/coding/integrations/system-health-dashboard/server.js:ro
      # Constraint monitor source (live-mounted so dashboard-server changes
      # don't require an image rebuild).
      - ${CODING_REPO:-.}/integrations/mcp-constraint-monitor/src:/coding/integrations/mcp-constraint-monitor/src:ro
      # Canonical constraint config — single source of truth shared between
      # host hooks and the in-container dashboard. Without this, the dashboard
      # silently loaded a different (stale) constraint set than the host hooks.
      - ${CODING_REPO:-.}/.constraint-monitor.yaml:/coding/.constraint-monitor.yaml:ro
      # Violation history — both the host hook (writer) and the in-container
      # dashboard (reader) must see the same file so what's logged appears on
      # the dashboard.
      - ${CODING_REPO:-.}/.mcp-sync:/coding/.mcp-sync:rw
      # LSL coordinator registry — bind-mounted so the constraint-monitor
      # dashboard inside the container can read coordinator/project
      # heartbeat timestamps. Without this, system-health always
      # reports "coordinator: unknown" because the file isn't visible.
      - ${CODING_REPO:-.}/.global-lsl-registry.json:/coding/.global-lsl-registry.json:ro
      # VKB visualizer build (live-mounted for development)
      - ${CODING_REPO:-.}/integrations/memory-visualizer/dist:/coding/integrations/memory-visualizer/dist:ro
      # Observation pipeline (live-mounted as a directory so new files like
      # ObservationSanitizer.js are picked up without rebuilding the image).
      - ${CODING_REPO:-.}/src/live-logging:/coding/src/live-logging:ro
      # Consolidator CLI used by the dashboard's spawn-based consolidation
      # endpoint (decoupled from the dashboard PID for WAL safety).
      - ${CODING_REPO:-.}/scripts/consolidate-observations.js:/coding/scripts/consolidate-observations.js:ro
      # Embedding pipeline (live-mounted for development)
      - ${CODING_REPO:-.}/dist/embedding:/coding/dist/embedding:ro
      - ${CODING_REPO:-.}/src/embedding/embedding-config.json:/coding/src/embedding/embedding-config.json:ro
      # Retrieval service modules (Phase 29 — plain JS, live-mounted)
      - ${CODING_REPO:-.}/src/retrieval:/coding/src/retrieval:ro
      # Knowledge management writers (UKBDatabaseWriter and friends —
      # live-mounted so VKB API changes don't require an image rebuild).
      - ${CODING_REPO:-.}/src/knowledge-management:/coding/src/knowledge-management:ro
      # VKB server source (live-mounted to avoid Docker rebuild for JS changes)
      - ${CODING_REPO:-.}/lib/vkb-server:/coding/lib/vkb-server:ro
    networks:
      - coding-network
    # Allow container to reach host services (DMR/llama.cpp)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4'
        reservations:
          memory: 1G
          cpus: '1'
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ===========================================
  # Database Containers
  # ===========================================

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: coding-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"     # HTTP API
      - "6334:6334"     # gRPC API
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    networks:
      - coding-network
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c 'cat < /dev/null > /dev/tcp/localhost/6333' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: coding-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - coding-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Memgraph Graph Database
  memgraph:
    image: memgraph/memgraph-platform:latest
    container_name: coding-memgraph
    restart: unless-stopped
    ports:
      - "7687:7687"     # Bolt protocol
      - "3100:3000"     # Memgraph Lab (changed to 3100 to avoid conflicts)
    volumes:
      - memgraph-data:/var/lib/memgraph
    environment:
      - MEMGRAPH="--log-level=WARNING"
    networks:
      - coding-network
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1;' | mgconsole || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

# ===========================================
# Networks
# ===========================================
networks:
  coding-network:
    driver: bridge

# ===========================================
# Volumes
# ===========================================
volumes:
  qdrant-data:
  redis-data:
  memgraph-data:
